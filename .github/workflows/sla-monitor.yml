name: SLA Compliance Monitor

on:
  schedule:
    - cron: '15 8 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SLA_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts/sla

permissions:
  contents: read

jobs:
  monitor:
    name: Monitor SLA Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-lock.txt

      - name: Run SLA monitor
        run: |
          python scripts/monitor_sla_compliance.py \
            --output $SLA_ARTIFACTS_DIR/sla_report.json \
            --history-file $SLA_ARTIFACTS_DIR/sla_history.jsonl \
            --audit-output $SLA_ARTIFACTS_DIR/compliance_audit.json \
            --integrity-output $SLA_ARTIFACTS_DIR/integrity_manifest.json \
            --strict

      - name: Upload SLA artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sla-monitor-artifacts
          retention-days: 90
          path: |
            ${{ env.SLA_ARTIFACTS_DIR }}/sla_report.json
            ${{ env.SLA_ARTIFACTS_DIR }}/sla_history.jsonl
            ${{ env.SLA_ARTIFACTS_DIR }}/compliance_audit.json
            ${{ env.SLA_ARTIFACTS_DIR }}/integrity_manifest.json
