name: SLA Compliance Monitor

on:
  schedule:
    - cron: '15 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: Monitor SLA Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run SLA monitor
        run: |
          mkdir -p logs
          python scripts/monitor_sla_compliance.py \
            --output logs/sla_report.json \
            --history-file logs/sla_history.jsonl \
            --strict

      - name: Upload SLA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sla-monitor-artifacts
          path: |
            logs/sla_report.json
            logs/sla_history.jsonl