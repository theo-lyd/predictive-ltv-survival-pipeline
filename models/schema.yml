version: 2

models:
  - name: stg_customers
    description: Cleaned customer subscription staging model.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: monthly_recurring_revenue
        tests:
          - not_null
      - name: signup_ts
        tests:
          - not_null
  - name: stg_promotions
    description: Cleaned promotion staging model.
    columns:
      - name: promotion_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: promotion_identity_key
        tests:
          - not_null
      - name: discount_percent
        description: Nullable by design to emulate messy source feeds.
  - name: stg_billing
    description: Billing records ingested via Airbyte when billing sync is enabled.
    columns:
      - name: invoice_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: invoice_amount
        tests:
          - not_null
  - name: int_promotions_resolved
    description: Deterministically resolved promotion entities after deduplication and stitching.
    columns:
      - name: promotion_surrogate_key
        tests:
          - not_null
          - unique
      - name: promotion_identity_key
        tests:
          - not_null
  - name: int_discount_cohorts
    description: Promotion-derived cohort segmentation by discount and tenure.
    columns:
      - name: discount_cohort
        tests:
          - not_null
      - name: tenure_cohort
        tests:
          - not_null
  - name: int_customer_state_transitions
    description: Customer lifecycle transition states reconciled with promotions and billing.
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: state_transition
        tests:
          - not_null
  - name: int_silver_bronze_reconciliation
    description: Aggregate-level reconciliation between Bronze and Silver metrics.
    columns:
      - name: entity_name
        tests:
          - not_null
      - name: count_delta_ratio
        tests:
          - not_null
      - name: mrr_delta_ratio
        tests:
          - not_null
  - name: fct_customer_ltv
    description: |
      Final customer-level LTV fact table.
      
      **Data Contract**: churn_probability must be non-null for all rows.
      If coverage from fct_churn_scores falls below 90%, the join will produce nulls, and the test will fail.
      This enforces the data quality requirement that churn prediction scores must be available for LTV calculation.
      
      **Observation Date**: All tenure and LTV calculations use the observation_date variable.
      Default is '2024-12-31'. Override with: dbt run --vars '{"observation_date": "YYYY-MM-DD"}'
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: ltv_net_value
        tests:
          - not_null
      - name: churn_probability
        description: |
          Customer churn probability (0-1) from fct_churn_scores.
          Must be non-null for all rows; if null, indicates missing churn score (model coverage gap).
        tests:
          - not_null
  - name: fct_gold_customer_features
    description: |
      Gold-layer customer feature table for survival and churn modeling.
      
      **Observation Date**: All temporal features (e.g., customer_tenure_months) are calculated relative to the observation_date variable.
      Default is '2024-12-31'. To snapshot features at a different date:
      ```
      dbt run --select fct_gold_customer_features --vars '{"observation_date": "2024-12-15"}'
      ```
      
      This ensures reproducible, time-locked feature sets for backtesting and validation.
      Features should NOT use wall-clock timestamps for business calculations.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_tenure_months
        description: |
          Months between signup and observation_date (for active customers) or churn_date (for churned customers).
          A fixed observation_date ensures this feature is reproducible across runs.
        tests:
          - not_null
      - name: discount_intensity_index
        tests:
          - not_null
      - name: contributed_margin_monthly
        tests:
          - not_null
  - name: fct_churn_scores
    description: Customer-level churn prediction scores generated from Gold features.
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: churn_probability
        tests:
          - not_null
      - name: risk_bucket
        tests:
          - not_null
  - name: fct_survival_curves
    description: Kaplan-Meier cohort survival curves for discount target cohorts.
    columns:
      - name: cohort_label
        tests:
          - not_null
      - name: survival_probability
        tests:
          - not_null
  - name: fct_survival_cohort_summary
    description: Cohort survival outputs at 3/6/12 month milestones.
    columns:
      - name: cohort_label
        tests:
          - not_null
      - name: survival_12m
        tests:
          - not_null
  - name: fct_model_quality_diagnostics
    description: Predictive model quality diagnostics for monitoring and governance.
    columns:
      - name: scored_population
        tests:
          - not_null
      - name: directional_accuracy_proxy
        tests:
          - not_null
  - name: fct_model_drift_baseline
    description: Drift baseline comparison for model feature population mix.
    columns:
      - name: discount_band
        tests:
          - not_null
      - name: drift_status
        tests:
          - not_null
