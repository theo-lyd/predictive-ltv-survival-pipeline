version: 2

models:
  - name: stg_customers
    description: Cleaned customer subscription staging model.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: monthly_recurring_revenue
        tests:
          - not_null
  - name: stg_promotions
    description: Cleaned promotion staging model.
    columns:
      - name: promotion_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: discount_percent
        description: Nullable by design to emulate messy source feeds.
  - name: stg_billing
    description: Billing records ingested via Airbyte when billing sync is enabled.
    columns:
      - name: invoice_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
  - name: fct_customer_ltv
    description: Final customer-level LTV fact table.
